name: akilasatolu-v5-dev

services:
    web:
        container_name: akilasatolu-v5-dev-web
        image: akilasatolu-v5-web-dev
        build:
            context: .
            dockerfile: Dockerfile.dev
        ports:
            # Host 3001 so prod (3000) and dev can run at the same time
            - "3001:3000"
        volumes:
            - .:/app
            - web_dev_node_modules:/app/node_modules
            - web_dev_next:/app/.next
        environment:
            NODE_ENV: development
            NEXT_TELEMETRY_DISABLED: "1"
            WATCHPACK_POLLING: "true"
            CHOKIDAR_USEPOLLING: "true"
        command: ["npm", "run", "dev", "--", "-H", "0.0.0.0", "-p", "3000"]

volumes:
    web_dev_node_modules:
    web_dev_next:
